gzip on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_vary on;
gzip_types text/plain text/css text/javascript application/javascript application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /about {
        try_files /about.html =404;
    }

    location = /blog {
        try_files /blog.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
