server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /about {
        try_files /about.html =404;
    }

    location = /blog {
        try_files /blog.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
